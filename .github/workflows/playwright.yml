name: E2E Tests 🚀

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Explicitly set security permissions.
permissions: {}

jobs:
  test:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      # Set up Node with npm caching
      - uses: actions/setup-node@v7
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: tests/e2e/package-lock.json

      # Install only the dependencies required to run the E2E suite
      - name: Install E2E dependencies
        run: npm ci --prefix tests/e2e --no-audit --fund=false --prefer-offline

      # Cache Playwright browsers
      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('tests/e2e/package-lock.json') }}

      # Install only Chromium browser for speed
      - name: Install Chromium only
        run: npm exec --prefix tests/e2e -- playwright install chromium

      # Run E2E tests (Playwright starts WordPress Playground automatically via webServer config)
      - name: Run E2E tests
        run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 30
